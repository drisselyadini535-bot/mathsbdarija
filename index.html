<!DOCTYPE html>
<html lang="fr">

<head>

  <title>Maths Bdarija</title>

  <style>

    body{

      padding:0;
      font-family:Arial;
      background:#f4f7fb;
    }

      margin:auto;
      padding:40px;
    }

    h1{
      color:#163769;
      font-size:50px;
    }

    p{

    }

      padding:15px 25px;

    </ul>

    <div class="card">

      <a
